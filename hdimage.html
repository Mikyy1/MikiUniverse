<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD Image Upscaler — Wink.ai</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: #fff;
    }

    .container {
      max-width: 560px;
      width: 100%;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 36px 32px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    /* Header */
    .header { text-align: center; margin-bottom: 28px; }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #c084fc, #818cf8, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .header p { font-size: 13px; color: rgba(255,255,255,0.5); }

    /* Upload Area */
    .upload-area {
      border: 2px dashed rgba(192,132,252,0.3);
      border-radius: 16px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
      position: relative;
    }
    .upload-area:hover { border-color: rgba(192,132,252,0.6); background: rgba(192,132,252,0.04); }
    .upload-area.dragover { border-color: #c084fc; background: rgba(192,132,252,0.1); }
    .upload-area .icon { font-size: 44px; margin-bottom: 10px; }
    .upload-area .text { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 4px; }
    .upload-area .hint { font-size: 12px; color: rgba(255,255,255,0.4); }
    .upload-area input[type="file"] { display: none; }

    /* Preview */
    .preview { display: none; text-align: center; margin-bottom: 20px; position: relative; }
    .preview.active { display: block; }
    .preview img {
      max-width: 100%;
      max-height: 260px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .preview .remove-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .preview .remove-btn:hover { background: rgba(239,68,68,0.8); }
    .preview .file-info {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }

    /* Mode Selector */
    .mode-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .mode-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: all 0.25s;
      user-select: none;
    }
    .mode-option:hover { border-color: rgba(192,132,252,0.4); background: rgba(192,132,252,0.04); }
    .mode-option.selected { border-color: #c084fc; background: rgba(192,132,252,0.12); }
    .mode-option input { display: none; }
    .mode-option .mode-label { font-size: 14px; font-weight: 500; }
    .mode-option.selected .mode-label { color: #c084fc; font-weight: 600; }
    .mode-option .mode-desc { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .mode-option.selected .mode-desc { color: rgba(192,132,252,0.7); }
    .mode-text { text-align: center; }

    /* Generate Button */
    .gen-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .gen-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(192,132,252,0.35); }
    .gen-btn:active:not(:disabled) { transform: translateY(0); }
    .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Progress Bar */
    .progress-wrap {
      display: none;
      margin-bottom: 20px;
    }
    .progress-wrap.active { display: block; }
    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #c084fc, #818cf8);
      border-radius: 3px;
      width: 0%;
      transition: width 0.5s ease;
    }
    .progress-text {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    /* Loading */
    .loading { display: none; text-align: center; padding: 32px 16px; }
    .loading.active { display: block; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(192,132,252,0.2);
      border-top-color: #c084fc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .load-text { font-size: 14px; color: rgba(255,255,255,0.6); }
    .loading .load-sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 4px; }

    /* Error */
    .error-box {
      display: none;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .error-box.active { display: block; }

    /* Result */
    .result { display: none; text-align: center; }
    .result.active { display: block; }
    .result img {
      max-width: 100%;
      max-height: 360px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin-bottom: 12px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .result img:hover { transform: scale(1.02); }
    .result .result-info {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }
    .result-actions { display: flex; gap: 10px; }
    .dl-btn, .again-btn {
      flex: 1;
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .dl-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
    }
    .dl-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.35); }
    .again-btn {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .again-btn:hover { background: rgba(255,255,255,0.12); }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: rgba(255,255,255,0.25);
    }

    /* Fullscreen modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .modal.active { display: flex; }
    .modal img {
      max-width: 95vw;
      max-height: 95vh;
      border-radius: 8px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container { padding: 28px 20px; border-radius: 20px; }
      .header h1 { font-size: 24px; }
      .mode-selector { flex-direction: column; }
      .result-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>✨ HD Image Upscaler</h1>
    <p>Powered by Wink.ai • No Watermark • No Credit</p>
  </div>

  <!-- Upload -->
  <div class="upload-area" id="uploadArea">
    <div class="icon">📸</div>
    <div class="text">Klik atau drag & drop gambar</div>
    <div class="hint">Max 10MB • JPG, PNG, WebP</div>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
  </div>

  <!-- Preview -->
  <div class="preview" id="preview">
    <img id="previewImg" src="" alt="Preview">
    <button class="remove-btn" id="removeBtn" title="Hapus gambar">✕</button>
    <div class="file-info" id="fileInfo"></div>
  </div>

  <!-- Mode Selector -->
  <div class="mode-selector" id="modeSelector">
    <label class="mode-option selected" data-mode="uhd">
      <input type="radio" name="mode" value="uhd" checked>
      <div class="mode-text">
        <div class="mode-label">🔥 Ultra HD</div>
        <div class="mode-desc">4K+ • Kualitas tertinggi</div>
      </div>
    </label>
    <label class="mode-option" data-mode="hd">
      <input type="radio" name="mode" value="hd">
      <div class="mode-text">
        <div class="mode-label">✨ HD</div>
        <div class="mode-desc">2K • Lebih cepat</div>
      </div>
    </label>
  </div>

  <!-- Generate -->
  <button class="gen-btn" id="genBtn" disabled>
    🚀 Generate HD Image
  </button>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="load-text" id="loadText">Memproses gambar...</div>
    <div class="load-sub" id="loadSub">Mohon tunggu, jangan tutup halaman ini</div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">Mengupload gambar...</div>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <img id="resultImg" src="" alt="HD Result" title="Klik untuk zoom">
    <div class="result-info" id="resultInfo"></div>
    <div class="result-actions">
      <a class="dl-btn" id="dlBtn" href="#" download>💾 Download</a>
      <button class="again-btn" id="againBtn">🔄 Lagi</button>
    </div>
  </div>

  <div class="footer">
    Wink
